<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>ปฏิทินการปฏิบัติงาน ผกม.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 1. ดึง FullCalendar พื้นฐาน -->
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
  <!-- 2. ดึง Plugin สำหรับอ่านไฟล์ iCal (.ics) แทน Google Calendar Plugin -->
  <script src='https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.10/index.global.min.js'></script>
  
  <style>
    body {
      font-family: 'Sarabun', 'Segoe UI', Tahoma, sans-serif;
      margin: 20px;
      padding: 0;
      background-color: #f0f4f8;
    }
    #calendar {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .fc-event-title {
      font-size: 0.9em;
      white-space: normal;
    }
    .fc-event { cursor: pointer; }
  </style>
</head>
<body>

  <div id='calendar'></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var calendarEl = document.getElementById('calendar');

      var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'th',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,listWeek'
        },
        
        // นำลิงก์ .ics ของคุณมาใส่ตรง url ได้เลย!
        events: {
          url: 'https://calendar.google.com/calendar/ical/661db2d4e0eef98e4af12082d9193ecadbd5ec47981248d6ed2ef48686515392%40group.calendar.google.com/public/basic.ics',
          format: 'ics' // บอกให้ระบบรู้ว่าเป็นไฟล์ ics
        }
      });

      calendar.render();
    });
  </script>
</body>
</html>
