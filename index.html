<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบปฏิทินและบันทึกงาน</title>
  
  <!-- Tailwind CSS สำหรับตกแต่ง UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FullCalendar.js สำหรับปฏิทิน -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
    .fc-event { cursor: pointer; }
    /* ซ่อน Scrollbar สำหรับความสวยงาม */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="p-4 md:p-6 text-gray-800">

  <div class="max-w-7xl mx-auto space-y-6">
    
    <!-- Header -->
    <div class="bg-white p-6 rounded-xl shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">📅 ปฏิทินปฏิบัติงาน</h1>
        <p class="text-gray-500 text-sm mt-1">คลิกที่ชื่อบุคคลในรายการเพื่อดูประวัติการทำงาน</p>
      </div>
      <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg shadow transition">
        🔄 รีเฟรชข้อมูล
      </button>
    </div>

    <!-- Layout หลัก (แบ่งซ้าย-ขวา) -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- ฝั่งซ้าย: รายการงานที่จะถึง -->
      <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm">
        <h2 class="text-lg font-bold text-gray-700 border-b pb-3 mb-4">📋 งานที่กำลังจะมาถึง</h2>
        <div id="dashboard-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
          <div class="text-center text-gray-400 py-10">กำลังโหลดข้อมูล...</div>
        </div>
      </div>

      <!-- ฝั่งขวา: ปฏิทิน FullCalendar -->
      <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm relative z-0">
        <div id="calendar"></div>
      </div>
      
    </div>
  </div>

  <!-- Modal สำหรับแสดงประวัติของแต่ละบุคคล -->
  <div id="historyModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden transform scale-95 transition-transform duration-300" id="historyModalContent">
      <div class="flex justify-between items-center p-5 border-b bg-gray-50">
        <h3 class="text-xl font-bold text-gray-800">
          👤 ประวัติการทำงาน: <span id="modalPersonName" class="text-blue-600"></span>
        </h3>
        <button onclick="closeHistoryModal()" class="text-gray-400 hover:text-red-500 text-2xl leading-none">&times;</button>
      </div>
      <div class="p-5 max-h-[60vh] overflow-y-auto">
        <div id="historyLogContainer" class="space-y-4">
          <!-- ข้อมูลประวัติจะถูกสร้างที่นี่ผ่าน JavaScript -->
        </div>
      </div>
      <div class="p-4 border-t bg-gray-50 text-right">
        <button onclick="closeHistoryModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-lg font-medium transition">ปิด</button>
      </div>
    </div>
  </div>

  <!-- JavaScript หลัก -->
  <script>
    let calendar;
    let allData = []; // เก็บข้อมูลทั้งหมดไว้ใช้ทำ History Log

    // ฟังก์ชันสร้างสีสุ่มจากชื่อ (เพื่อให้สีแต่ละคนไม่เหมือนกันและจำง่าย)
    function getColorForName(name) {
      if (!name) return '#3b82f6';
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      const hue = Math.abs(hash) % 360;
      return `hsl(${hue}, 70%, 50%)`;
    }

    // 🌟 ฟังก์ชันแก้ปัญหาวันที่เพี้ยน (บังคับแปลงกลับมาเป็น Local Date YYYY-MM-DD เป๊ะๆ)
    function getSafeDateStr(dateValue) {
      if (!dateValue) return '';
      // กรณีข้อมูลเป็น ISO string (มี T หรือ Z) นำมาแปลงเป็น Local object ก่อน
      let d = new Date(dateValue);
      if (isNaN(d.getTime())) {
        // Fallback กรณีข้อความดิบ
        return dateValue.split('T')[0].split(' ')[0];
      }
      let y = d.getFullYear();
      let m = String(d.getMonth() + 1).padStart(2, '0');
      let day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    // ฟังก์ชันดึงข้อมูล (คุณสามารถแก้ไขชื่อฟังก์ชัน google.script.run ให้ตรงกับของคุณได้)
    function fetchData() {
      document.getElementById('dashboard-list').innerHTML = '<div class="text-center text-blue-500 py-10 font-medium">กำลังโหลดข้อมูล...</div>';
      
      // เรียกฟังก์ชันฝั่ง Apps Script (เปลี่ยน "getDataFromSheet" เป็นชื่อฟังก์ชันของคุณถ้าไม่ตรงกัน)
      if (typeof google !== 'undefined' && google.script) {
        google.script.run.withSuccessHandler(renderApp).getDataFromSheet(); 
      } else {
        console.warn('ไม่ได้รันบน Google Apps Script');
      }
    }

    // ฟังก์ชันหลักสำหรับวาด UI
    function renderApp(data) {
      allData = data; // เก็บลงตัวแปร Global ไว้กรอง History
      let eventsForCalendar = [];
      let todayStr = getSafeDateStr(new Date());

      // เคลียร์กระดานแดชบอร์ด
      const dashboard = document.getElementById('dashboard-list');
      dashboard.innerHTML = '';

      // กรองและเรียงลำดับข้อมูลสำหรับแสดงใน Dashboard (เอาเฉพาะงานในอนาคต/วันนี้)
      let upcomingTasks = allData.filter(item => {
        let endD = item.EndDate ? getSafeDateStr(item.EndDate) : getSafeDateStr(item.Date);
        return endD >= todayStr;
      });

      upcomingTasks.sort((a, b) => getSafeDateStr(a.Date).localeCompare(getSafeDateStr(b.Date)));

      // 1. วาดการ์ดแดชบอร์ด
      if (upcomingTasks.length === 0) {
        dashboard.innerHTML = '<div class="text-center text-gray-400 py-10">ไม่มีงานใหม่ในระยะนี้</div>';
      } else {
        upcomingTasks.forEach(item => {
          let dateStr = getSafeDateStr(item.Date);
          let endStr = item.EndDate ? getSafeDateStr(item.EndDate) : dateStr;
          let dateDisplay = dateStr === endStr ? dateStr : `${dateStr} ถึง ${endStr}`;
          let color = getColorForName(item.Name);

          let card = document.createElement('div');
          card.className = "p-4 border border-l-4 rounded-lg bg-gray-50 shadow-sm hover:shadow-md transition-shadow";
          card.style.borderLeftColor = color;
          card.innerHTML = `
            <div class="text-xs text-gray-500 mb-1 flex items-center justify-between">
              <span>📅 ${dateDisplay} ${item.Time ? `| ⏰ ${item.Time}` : ''}</span>
            </div>
            <div class="font-bold text-gray-800 text-md mb-1">${item.Task}</div>
            <div class="flex items-center text-sm">
              <span class="mr-2">👤</span> 
              <!-- 🌟 จุดคลิกเพื่อดูประวัติ -->
              <span class="font-medium cursor-pointer hover:underline text-blue-600 transition" 
                    onclick="openHistoryModal('${item.Name}')">${item.Name}</span>
            </div>
          `;
          dashboard.appendChild(card);
        });
      }

      // 2. เตรียมข้อมูลสำหรับ FullCalendar
      allData.forEach(item => {
        let startSafe = getSafeDateStr(item.Date);
        let endSafeBase = item.EndDate ? getSafeDateStr(item.EndDate) : startSafe;
        let isPast = endSafeBase < todayStr;
        let color = isPast ? '#94a3b8' : getColorForName(item.Name);

        // จัดการเวลา
        let startTime = '';
        if (item.Time && item.Time.includes('-')) {
           startTime = item.Time.split('-')[0].trim();
        } else if (item.Time) {
           startTime = item.Time.trim();
        }

        let eventObj = {
          title: `${item.Name} - ${item.Task}`,
          backgroundColor: color,
          borderColor: color,
          allDay: !startTime,
          extendedProps: { ...item }
        };

        if (startTime) {
          // มีการระบุเวลา
          eventObj.start = `${startSafe}T${startTime}:00`;
        } else {
          // 🌟 All-day event (ใช้ Format YYYY-MM-DD แบบเพียวๆ จะไม่โดน Timezone shift เลย)
          eventObj.start = startSafe;
          
          // กฎของ FullCalendar: End Date ของ All-Day Event ต้องบวก 1 วันเสมอ
          let [y, m, d] = endSafeBase.split('-').map(Number);
          let endD = new Date(y, m - 1, d + 1); // บวก 1 วัน
          eventObj.end = `${endD.getFullYear()}-${String(endD.getMonth() + 1).padStart(2, '0')}-${String(endD.getDate()).padStart(2, '0')}`;
        }
        
        eventsForCalendar.push(eventObj);
      });

      // 3. เรนเดอร์ปฏิทิน
      renderCalendar(eventsForCalendar);
    }

    // ฟังก์ชันวาด FullCalendar
    function renderCalendar(eventsList) {
      let calendarEl = document.getElementById('calendar');
      
      // ล้างปฏิทินเก่าถ้ามี
      if (calendar) { calendar.destroy(); }

      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'th', // ใช้ภาษาไทย
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,listMonth'
        },
        buttonText: { today: 'วันนี้', month: 'เดือน', week: 'สัปดาห์', list: 'รายการ' },
        events: eventsList,
        height: 600,
        eventClick: function(info) {
          // เมื่อคลิกเหตุการณ์ในปฏิทิน ให้เปิดประวัติของคนๆ นั้นเลย
          let pName = info.event.extendedProps.Name;
          if (pName) openHistoryModal(pName);
        }
      });
      calendar.render();
    }

    // 🌟 ระบบ History Log ของบุคคล
    function openHistoryModal(personName) {
      document.getElementById('modalPersonName').innerText = personName;
      const logContainer = document.getElementById('historyLogContainer');
      logContainer.innerHTML = '';

      // กรองงานที่เป็นของคนนี้
      let personLogs = allData.filter(item => item.Name === personName);
      
      // เรียงจากวันที่ล่าสุดลงไปหาเก่าสุด
      personLogs.sort((a, b) => getSafeDateStr(b.Date).localeCompare(getSafeDateStr(a.Date)));

      if (personLogs.length === 0) {
        logContainer.innerHTML = '<div class="text-center text-gray-500 py-4">ไม่พบประวัติการทำงาน</div>';
      } else {
        // วาดรายการประวัติทีละอัน
        personLogs.forEach(log => {
          let startDate = getSafeDateStr(log.Date);
          let todayStr = getSafeDateStr(new Date());
          
          // เช็คสถานะว่าผ่านมาแล้วหรือยัง
          let statusBadge = startDate < todayStr 
            ? `<span class="px-2 py-1 bg-gray-200 text-gray-600 text-xs rounded-full">เสร็จสิ้น/ผ่านมาแล้ว</span>`
            : `<span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded-full font-medium">กำลังจะมาถึง</span>`;

          let div = document.createElement('div');
          div.className = "flex flex-col md:flex-row md:items-start justify-between p-4 border rounded-lg bg-white shadow-sm hover:border-blue-300 transition";
          div.innerHTML = `
            <div>
              <div class="font-bold text-gray-800 text-lg mb-1">${log.Task}</div>
              <div class="text-sm text-gray-600 space-y-1">
                <div>📅 วันที่: <span class="font-medium">${startDate}</span> ${log.EndDate ? `- ${getSafeDateStr(log.EndDate)}` : ''}</div>
                ${log.Time ? `<div>⏰ เวลา: ${log.Time}</div>` : ''}
                ${log.Location ? `<div>📍 สถานที่: ${log.Location}</div>` : ''}
              </div>
            </div>
            <div class="mt-3 md:mt-0 md:text-right flex flex-col justify-between h-full">
              ${statusBadge}
            </div>
          `;
          logContainer.appendChild(div);
        });
      }

      // แสดง Modal พร้อม Animation
      const modal = document.getElementById('historyModal');
      const modalBox = document.getElementById('historyModalContent');
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        modalBox.classList.remove('scale-95');
      }, 10);
    }

    function closeHistoryModal() {
      const modal = document.getElementById('historyModal');
      const modalBox = document.getElementById('historyModalContent');
      
      // Animation ปิด
      modal.classList.add('opacity-0');
      modalBox.classList.add('scale-95');
      setTimeout(() => {
        modal.classList.add('hidden');
      }, 300);
    }

    // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
    window.onload = function() {
      fetchData();
    };
  </script>

</body>
</html>
